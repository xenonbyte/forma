description = "Change the brand/system style of a Forma product's design system by persisting config then fully regenerating the component library via MCP, then self-review."
prompt = """
# Forma route: fm-change-style

Use shared Forma guidance at ~/.forma/skills/forma/SKILL.md.

Change the `brand_style` / `system_style` for an entire product. This command: (1) persists the new style config with `update_product_config`, then (2) fully regenerates the component library (design system) using the same generation flow as fm-refine-components вҖ” inlined here. Design-page artifacts are NOT touched.

Preconditions (tier 1):
- Tier 1: a product must exist and be selected.
If the core tool returns `REQUIREMENT_NOT_FOUND` or `REQUIREMENT_STATUS_INVALID` in an unexpected context, report the error faithfully.

Execution:
1. Require product_id from context or ask the user to run `fm-list-product` first.
2. Confirm the new `brand_style` and optional `system_style`. If not already chosen, call `list_styles` and confirm with the user.
3. Persist the style config: first call `get_product(product_id)` to read the existing `platform`, `languages`, and `default_language`. These product config fields are optional on freshly created products. Before calling `update_product_config`, require concrete values: `platform` is set, `languages` is a non-empty list, and `default_language` is set and included in `languages`. If any missing product config field is absent or empty, ask the user to provide/confirm the missing `platform`, `languages`, and/or `default_language`; do not infer silent defaults. Do NOT pass undefined, null, or empty values to `update_product_config`. Then call `update_product_config(product_id, platform, brand_style, system_style, languages, default_language)` carrying the existing or user-confirmed values forward with the new style. This is the authoritative config write. If this step fails, stop and report the error вҖ” do not continue.

   **Partial-failure boundary**: if `update_product_config` succeeds but any subsequent step (export, generation, save, or self-review) fails, STOP immediately and report:
   > "дә§е“Ғй…ҚзҪ®е·Іжӣҙж–°дҪҶеҪ“еүҚз»„д»¶еә“еҸҜиғҪд»ҚжҳҜж—§зүҲжң¬/жңӘеҲ·ж–°пјҲpartial update: product config saved but component library may be staleпјүгҖӮиҜ·йҮҚи·‘ fm-refine-components жҲ– fm-change-style д»ҘеҲ·ж–°з»„д»¶еә“жҢҮй’ҲзүҲжң¬гҖӮ"
   Do NOT continue to trigger fm-design or claim the style change is fully applied.

4. Load the current component library for re-skin when one exists (inlined fm-refine-components flow):
   - Call `list_product_artifacts(product_id, kind="component-library")` to find the current non-superseded library. Do not use legacy/superseded artifacts as a re-skin source; `generate_components` writes to the current product pointer or creates the first current library.
   - If no current component library is returned, continue with initial generation: no `source_html` and no export step. This is a normal first-time refresh after the config write, not a partial failure.
   - If a current library exists, call `get_product_artifact(product_id, artifact_id)` to read its manifest. A current library is a valid re-skin source regardless of whether its manifest carries any legacy `forma.productIcon` metadata; the icon unit is retired (D6) and is never re-emitted here.
   - If a current library exists, call `export_artifact(product_id, artifact_id, format="html")` and read the returned `output_path` as `source_html`. If the export response notes omitted assets, also call `export_artifact(product_id, artifact_id, format="zip")` and inspect the bundle. Stop and report the partial-failure message (step 3 boundary) if the source HTML cannot be loaded.
5. Fetch style knowledge BEFORE generating: call `get_style(brand_style)` (returns DESIGN.md, tokens.css, components.html). If `system_style` is set, call `get_style(system_style)` too.
6. Call `get_component_baseline(product_id)` to obtain the authoritative spec: `{ platform, baseline: { foundations, components } }`. Use this as the sole source of WHAT to produce.
7. Palette design-read (before defining brand tokens): read `craft_rules` from the `get_component_baseline` response. Apply the palette-rotation rule from ai-tells: do not default to warm beige/cream with brass/clay/oxblood unless brand_style tokens already lock that palette. Rotate real alternatives and record the chosen direction in one line.
8. Regenerate the component library as **shared CSS (`tokens_css`) + an ordered list of units (`units`)**, applying the new style. The new brand/system tokens drive `tokens_css`; the units carry structure. Do NOT produce a single combined HTML document.
   - **`tokens_css`** (a single CSS string): derive ALL shared styling from the new `brand_style` (+ `system_style`) tokens вҖ” design tokens/variables, base styles, component classes, fonts, and `@font-face` declarations. Every class or CSS variable referenced by any `body_html` fragment must be defined here. No `<style>` tags go into `body_html`.
   - **`units`** вҖ” emit exactly the following units IN THIS ORDER (NO icon unit вҖ” the app icon lives in brand assets via `fm-app-icon`, not in the component library):
     a. `{ id: "foundations", role: "foundations", title: "Foundations", body_html: <fragment> }` вҖ” token visualization for every category in `baseline.foundations`, using the NEW tokens.
     b. One `{ id: "<component-slug>", role: "component", title: <component name>, body_html: <fragment> }` per entry in `baseline.components`, covering all listed states/variants. The `id` slug MUST match `^[a-z0-9][a-z0-9-]{0,63}$`. When `source_html` exists (exported in step 4), PRESERVE each component's existing structure/markup вҖ” carry it into the corresponding unit's `body_html`, applying the new style ONLY through the new `tokens_css` (do not restructure the markup; re-theme via CSS). When no `source_html` exists, generate the baseline component set from scratch.
   **Each `body_html` MUST be a pure markup fragment** вҖ” no `<html>`, `<head>`, `<body>`, or `<style>` tags. It must render correctly using ONLY the classes and CSS variables defined in `tokens_css`.
   Pure-static contract: no `<script>`, no inline `on*` handlers, no `javascript:` URLs, no external scripts/stylesheets; inline images as `data:` URLs; no remote URLs anywhere. This applies to each `body_html` fragment and to `tokens_css`.
9. Save the component library with `generate_components`, passing:
   - `product_id`, `title`, `brand_style`, `system_style`
   - `tokens_css`: the shared CSS string containing all shared styles (tokens, component classes, fonts)
   - `units`: the ordered array of unit objects вҖ” `[ { id, role, title, body_html }, вҖҰ ]` вҖ” as produced in step 8
   **Do NOT include a top-level `html` field** вҖ” the `tokens_css` + `units` fields replace it entirely.
   Do NOT submit `product_icon` or icon SVG `supporting_files`: the icon unit is retired (D6) and the app icon is owned by `fm-app-icon` / brand assets. (Old artifacts that still carry `manifest.forma.productIcon` remain valid; this command simply stops emitting it.)
   If this step fails, stop and report the partial-failure message from step 3.
   The tool returns `artifact_id`, `version`, `preview_status`.
10. Self-review (MANDATORY):
   - Read it back: `get_product_artifact(product_id, artifact_id)` and inspect `manifest.forma.quality.craftChecks`.
   - For any check with `passed:false`, fix that specific violation and call `generate_components` again until the checks pass.
   - Also judge the non-mechanical craft items the lint cannot (type hierarchy, color restraint, contrast, state coverage, form validation, motion, UX laws); regenerate if any fails.
   - If self-review fails after repeated attempts, stop and report the partial-failure message from step 3.
11. Report `artifact_id`, the final `version`, `preview_status`, and a short craftChecks summary. **Stale-asset reminder (D11 вҖ” no auto-regen, just flag):** a brand/system style change does NOT regenerate the app icon or marketing imagery; remind the user that the existing app icon and any marketing/brand assets may now be off-palette and can be refreshed by re-running `fm-app-icon` (app icon) and `fm-brand-assets` (marketing assets). Do NOT run them automatically. End here вҖ” do NOT trigger fm-design or any follow-up commands.
"""
