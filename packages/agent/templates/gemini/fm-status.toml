description = "Report Forma product, requirement, and artifact status. Read-only."
prompt = """
# Forma route: fm-status

Use shared Forma guidance at ~/.forma/skills/forma/SKILL.md.

Preconditions (tier 1):
- 档1: a product must exist and be selected. This is a read-only status command; no requirement is required.
If the core tool returns `REQUIREMENT_NOT_FOUND` or `REQUIREMENT_STATUS_INVALID`, report the error faithfully.

Cold path scenario:
The user wants to know the current state of a product — its config, latest requirement, and available design artifacts. The agent reads product info, requirement history, and artifact list, then presents a concise status summary without making any mutations.

Execution:
1. Require product_id from context or ask the user to run `fm-list-product` first.
2. Call `get_product` with product_id to fetch platform, style, languages, and default_language.
3. Call `get_requirement_history` with product_id and show the latest requirement title, state, and ui_affected flag.
4. Call `list_product_artifacts` with product_id and summarize available artifacts (id, type, created_at).
5. Display a concise status: product config completeness, requirement state, and artifact count.
6. Report stable error codes when returned. Make no mutations.
"""
