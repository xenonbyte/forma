name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so Biome's `--changed --since` can diff against the base.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Formatting is a BLOCKING gate: the whole repo is normalized via
      # `pnpm format`, so any drift fails CI.
      - name: Biome format check (blocking)
        run: pnpm exec biome format .

      # Linting stays report-only on changed files: the codebase still carries a
      # lint backlog (~33 recommended rules, see docs/tech-debt.md). Promote to a
      # blocking gate after that backlog is worked down.
      - name: Biome lint (report-only)
        continue-on-error: true
        run: pnpm exec biome lint --changed --since=origin/${{ github.base_ref || 'main' }} .

      # Playwright Chromium powers the browser test projects (viewer, desktop-shell)
      # and `--with-deps` installs the shared OS libraries both browsers need.
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      # Many core/parser tests drive Puppeteer; pnpm does not run puppeteer's
      # postinstall browser download by default, so install the browsers here.
      # Two binaries are needed: `chrome` for PuppeteerParser (headless: true) and
      # `chrome-headless-shell` for preview-renderer.ts (headless: 'shell').
      - name: Install Puppeteer browsers
        run: |
          pnpm --filter @vzi-core/parser exec puppeteer browsers install chrome
          pnpm --filter @vzi-core/parser exec puppeteer browsers install chrome-headless-shell

      # `pnpm typecheck` builds every package first (incl. the in-progress od-*
      # subsystem, whose tests resolve sibling packages through their built dist),
      # then runs per-package tsc and the scripts typecheck — so it covers build.
      - name: Typecheck (includes build)
        run: pnpm typecheck

      - name: Test
        run: pnpm test
